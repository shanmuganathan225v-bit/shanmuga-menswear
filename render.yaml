services:
  - type: web
    name: shanmuga-menswear
    env: static
    buildCommand: ""
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /images/*
        name: Cache-Control
        value: public, max-age=86400
      - path: "*.html"
        name: Cache-Control
        value: public, max-age=0, must-revalidate
